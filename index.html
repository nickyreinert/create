<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Canvas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center">
  <div class="text-center space-y-6 p-8">
    <div class="text-6xl animate-pulse">✦</div>
    <h1 class="text-3xl font-mono font-bold tracking-tight">
      Waiting for vibes...
    </h1>
    <p class="text-white/40 font-mono text-sm max-w-sm mx-auto">
      Submit a prompt using the button in the bottom right corner.
      The AI will reshape this entire page.
    </p>
    <div class="flex gap-2 justify-center text-white/20 text-xs font-mono">
      <span>collaborative</span>
      <span>·</span>
      <span>anonymous</span>
      <span>·</span>
      <span>vibe coding</span>
    </div>
  </div>
</body>
</html>
